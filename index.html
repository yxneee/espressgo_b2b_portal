<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"/>

  <title>ESPRESSGO B2B Wholesale Portal</title>

  <meta
    name="description"
    content="ESPRESSGO B2B Wholesale Portal — gel-based espresso shots for business."/>

  <!-- Redirect immediately to catalog page -->
  <meta
    http-equiv="refresh"
    content="0; url=catalog.html"/>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #F6F2EE;
      color: #2C1810;
    }

    .redirect-box {
      background: #fff;
      border: 1px solid #E8E0D8;
      border-radius: 18px;
      padding: 2rem;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 8px 28px rgba(44, 24, 16, 0.08);
    }

    .logo {
      width: 44px;
      height: 44px;
      margin: 0 auto 1rem;
      background: #C8853A;
      color: #fff;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }

    h1 {
      font-size: 1.3rem;
      margin: 0 0 0.4rem;
    }

    p {
      margin: 0;
      color: #8B7355;
      font-size: 14px;
      line-height: 1.6;
    }

    a {
      color: #C8853A;
      text-decoration: none;
      font-weight: 600;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <div class="redirect-box">

    <div class="logo">
      E
    </div>

    <h1>
      ESPRESSGO B2B Portal
    </h1>

    <p>
      Redirecting to the wholesale catalog…
      <br>
      <a href="catalog.html">
        Click here if you are not redirected.
      </a>
    </p>

  </div>

  <script>
    window.location.replace('catalog.html');
  </script>

</body>
</html>
